    <link rel="stylesheet" href="style.css">
    <style>
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo img { height: 50px; }
        #cart-button {
            background: #111;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        #cart-button:hover { background: #333; transform: scale(1.05); }
        #cart-count {
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 12px;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
        .cart-hidden { display: none !important; }
        #cart-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            justify-content: flex-end;
        }
        .cart-content {
            background: #fff;
            width: 100%;
            max-width: 420px;
            height: 100%;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: -4px 0 20px rgba(0,0,0,0.15);
        }
        .cart-content h2 { margin: 0; font-size: 22px; }
        #cart-items { flex: 1; overflow-y: auto; }
        .cart-footer { border-top: 2px solid #111; padding-top: 16px; }
        .cart-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        #checkout-whatsapp {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
            font-weight: bold;
            transition: background 0.2s;
        }
        #checkout-whatsapp:hover { background: #1da851; }
        #close-cart {
            width: 100%;
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #close-cart:hover { background: #ddd; }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <div class="logo">
            <img src="logo.png" alt="Urban Kicks Logo">
        </div>
        <button id="cart-button">
            🛒 Cart <span id="cart-count">0</span>
        </button>
    </nav>

    <!-- WELCOME SECTION -->
    <section class="welcome animate-welcome">
        <h2>Welcome</h2>
        <p>Original Kicks & Cozy Threads 🔥 Shop quality fashion at affordable prices</p>
    </section>

    <!-- SEARCH -->
    <div class="search-container">
        <input type="text" id="product-search" placeholder="Search products..shoes....">
        <button id="search-btn">Search</button>
    </div>

    <!-- GENDER FILTER BUTTONS -->
    <div class="gender-buttons">
        <button onclick="selectGender('all')">All Genders</button>
        <button onclick="selectGender('men')">Men</button>
        <button onclick="selectGender('women')">Women</button>
    </div>

    <!-- CATEGORY BUTTONS -->
    <div id="category-buttons-container" class="category-buttons"></div>

    <!-- PRODUCT GRID -->
    <main>
        <div id="product-container" class="product-container"></div>
    </main>

    <!-- CART MODAL -->
    <div id="cart-modal" class="cart-hidden">
        <div class="cart-content">
            <h2>🛒 Your Cart</h2>
            <div id="cart-items"></div>
            <div class="cart-footer">
                <div class="cart-total-row">
                    <span>Total:</span>
                    <span>KSh <span id="cart-total">0</span></span>
                </div>
                <button id="checkout-whatsapp">💬 Checkout via WhatsApp</button>
                <button id="close-cart">Close</button>
            </div>
        </div>
    </div>

    <!-- FOOTER -->

            </div>
        </div>
        <p class="footer-bottom">
            © 2026 Derick's Urban Kicks and Threads. All rights reserved.
        </p>
    </footer>

    <!-- JS FILES -->
    <script src="products.js"></script>
    <script src="script.js"></script>

</body>
